[pytest]
# Pytest configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=core
    --cov=api
    --cov=session
    --cov-report=term-missing
    --cov-report=html

# Async test support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    e2e: End-to-end tests
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests

# Coverage settings
[coverage:run]
source = .
omit =
    .venv/*
    */__pycache__/*
    tests/*
    */tests/*
    */.*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod